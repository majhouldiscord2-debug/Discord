kind = "web"
previewPath = "/"
title = "Discord Clone"
version = "1.0.0"
id = "artifacts/discord-clone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20217
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/discord-clone run dev"

[services.env]
PORT = "20217"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/discord-clone", "run", "build"]
publicDir = "artifacts/discord-clone/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
